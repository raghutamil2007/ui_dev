<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW Racing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #1a1a2e, #0f0f1e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            background: linear-gradient(to bottom, #2d3436, #636e72);
            border: 4px solid #0984e3;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(9, 132, 227, 0.5);
        }

        #gameCanvas {
            display: block;
            background: #34495e;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .score {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 2px solid #0984e3;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            display: none;
            z-index: 20;
            border: 3px solid #0984e3;
        }

        .game-over.show {
            display: block;
        }

        .game-over h1 {
            color: #ff6b6b;
            margin-bottom: 20px;
            font-size: 48px;
        }

        .game-over p {
            font-size: 24px;
            margin: 10px 0;
        }

        .restart-btn {
            background: #0984e3;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            background: #74b9ff;
            transform: scale(1.05);
        }

        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 15;
            overflow-y: auto;
        }

        .start-screen h1 {
            font-size: 48px;
            color: #0984e3;
            margin-bottom: 20px;
        }

        .start-screen p {
            font-size: 18px;
            margin: 10px 0;
        }

        .controls {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .car-selection {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            max-width: 500px;
        }

        .car-selection h2 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #0984e3;
        }

        .car-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .car-option {
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .car-option:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .car-option.selected {
            border-color: #0984e3;
            background: rgba(9, 132, 227, 0.3);
            box-shadow: 0 0 20px rgba(9, 132, 227, 0.5);
        }

        .car-preview {
            width: 60px;
            height: 90px;
            margin: 0 auto 10px;
        }

        .car-name {
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div class="ui-overlay">
            <div class="score">
                <div>Score: <span id="score">0</span></div>
                <div>Speed: <span id="speed">5</span></div>
            </div>
        </div>

        <div class="start-screen" id="startScreen">
            <h1>🏎️ BMW RACING 🏎️</h1>
            
            <div class="car-selection">
                <h2>SELECT YOUR CAR</h2>
                <div class="car-grid">
                    <div class="car-option selected" onclick="selectCar(0)" id="car0">
                        <canvas class="car-preview" id="preview0" width="60" height="90"></canvas>
                        <div class="car-name">BMW Blue</div>
                    </div>
                    <div class="car-option" onclick="selectCar(1)" id="car1">
                        <canvas class="car-preview" id="preview1" width="60" height="90"></canvas>
                        <div class="car-name">BMW Red</div>
                    </div>
                    <div class="car-option" onclick="selectCar(2)" id="car2">
                        <canvas class="car-preview" id="preview2" width="60" height="90"></canvas>
                        <div class="car-name">BMW Black</div>
                    </div>
                    <div class="car-option" onclick="selectCar(3)" id="car3">
                        <canvas class="car-preview" id="preview3" width="60" height="90"></canvas>
                        <div class="car-name">BMW Green</div>
                    </div>
                    <div class="car-option" onclick="selectCar(4)" id="car4">
                        <canvas class="car-preview" id="preview4" width="60" height="90"></canvas>
                        <div class="car-name">BMW Purple</div>
                    </div>
                    <div class="car-option" onclick="selectCar(5)" id="car5">
                        <canvas class="car-preview" id="preview5" width="60" height="90"></canvas>
                        <div class="car-name">BMW Orange</div>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <p>⬅️ LEFT ARROW - Move Left</p>
                <p>➡️ RIGHT ARROW - Move Right</p>
            </div>
            <button class="restart-btn" onclick="startGame()">START GAME</button>
        </div>

        <div class="game-over" id="gameOver">
            <h1>GAME OVER!</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>Max Speed: <span id="maxSpeed">0</span></p>
            <button class="restart-btn" onclick="restartGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        let gameLoop;
        let gameRunning = false;
        let score = 0;
        let speed = 5;
        let roadOffset = 0;
        let keys = {};
        let selectedCarIndex = 0;

        // Car colors for selection
        const carColors = [
            '#0984e3', // Blue
            '#e74c3c', // Red
            '#2d3436', // Black
            '#27ae60', // Green
            '#9b59b6', // Purple
            '#e67e22'  // Orange
        ];

        // Player car
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 120,
            width: 50,
            height: 90,
            speed: 7
        };

        // Obstacles
        let obstacles = [];
        const obstacleWidth = 50;
        const obstacleHeight = 90;
        const lanes = [75, 175, 275];

        // Road markings
        let roadMarkings = [];

        // Car selection function
        function selectCar(index) {
            selectedCarIndex = index;
            // Remove selected class from all cars
            for (let i = 0; i < 6; i++) {
                document.getElementById('car' + i).classList.remove('selected');
            }
            // Add selected class to chosen car
            document.getElementById('car' + index).classList.add('selected');
        }

        // Draw car preview
        function drawCarPreview(canvasId, colorIndex) {
            const previewCanvas = document.getElementById(canvasId);
            const previewCtx = previewCanvas.getContext('2d');
            const color = carColors[colorIndex];
            
            // Clear canvas
            previewCtx.clearRect(0, 0, 60, 90);
            
            const x = 5;
            const y = 0;
            const w = 50;
            const h = 90;
            
            // Car body
            previewCtx.fillStyle = color;
            previewCtx.fillRect(x, y, w, h);
            
            // Car roof
            previewCtx.fillStyle = '#2d3436';
            previewCtx.fillRect(x + 5, y + 10, w - 10, 30);
            
            // Windshield
            previewCtx.fillStyle = '#74b9ff';
            previewCtx.fillRect(x + 8, y + 15, w - 16, 20);
            
            // BMW logo area
            previewCtx.fillStyle = 'white';
            previewCtx.beginPath();
            previewCtx.arc(x + w / 2, y + 5, 6, 0, Math.PI * 2);
            previewCtx.fill();
            
            previewCtx.fillStyle = color;
            previewCtx.beginPath();
            previewCtx.arc(x + w / 2, y + 5, 4, 0, Math.PI * 2);
            previewCtx.fill();
            
            // Wheels
            previewCtx.fillStyle = '#2d3436';
            previewCtx.fillRect(x - 5, y + 15, 10, 20);
            previewCtx.fillRect(x + w - 5, y + 15, 10, 20);
            previewCtx.fillRect(x - 5, y + 55, 10, 20);
            previewCtx.fillRect(x + w - 5, y + 55, 10, 20);
            
            // Headlights
            previewCtx.fillStyle = '#f1c40f';
            previewCtx.fillRect(x + 5, y + h - 5, 15, 5);
            previewCtx.fillRect(x + w - 20, y + h - 5, 15, 5);
        }

        // Initialize car previews
        function initCarPreviews() {
            for (let i = 0; i < 6; i++) {
                drawCarPreview('preview' + i, i);
            }
        }

        // Initialize road markings
        function initRoadMarkings() {
            roadMarkings = [];
            for (let i = 0; i < 15; i++) {
                roadMarkings.push({
                    x: canvas.width / 2 - 5,
                    y: i * 60,
                    width: 10,
                    height: 40
                });
            }
        }

        // Draw BMW car (player)
        function drawPlayer() {
            const color = carColors[selectedCarIndex];
            
            // Car body
            ctx.fillStyle = color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // Car roof
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(player.x + 5, player.y + 10, player.width - 10, 30);
            
            // Windshield
            ctx.fillStyle = '#74b9ff';
            ctx.fillRect(player.x + 8, player.y + 15, player.width - 16, 20);
            
            // BMW logo area
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(player.x + player.width / 2, player.y + 5, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(player.x + player.width / 2, player.y + 5, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Wheels
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(player.x - 5, player.y + 15, 10, 20);
            ctx.fillRect(player.x + player.width - 5, player.y + 15, 10, 20);
            ctx.fillRect(player.x - 5, player.y + 55, 10, 20);
            ctx.fillRect(player.x + player.width - 5, player.y + 55, 10, 20);
            
            // Headlights
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(player.x + 5, player.y + player.height - 5, 15, 5);
            ctx.fillRect(player.x + player.width - 20, player.y + player.height - 5, 15, 5);
        }

        // Draw obstacle car
        function drawObstacle(obstacle) {
            // Different colored cars
            const colors = ['#e74c3c', '#2ecc71', '#f39c12', '#9b59b6'];
            const color = colors[obstacle.colorIndex];
            
            ctx.fillStyle = color;
            ctx.fillRect(obstacle.x, obstacle.y, obstacleWidth, obstacleHeight);
            
            // Car roof
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(obstacle.x + 5, obstacle.y + 50, obstacleWidth - 10, 30);
            
            // Windshield
            ctx.fillStyle = '#95a5a6';
            ctx.fillRect(obstacle.x + 8, obstacle.y + 55, obstacleWidth - 16, 20);
            
            // Wheels
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(obstacle.x - 5, obstacle.y + 15, 10, 20);
            ctx.fillRect(obstacle.x + obstacleWidth - 5, obstacle.y + 15, 10, 20);
            ctx.fillRect(obstacle.x - 5, obstacle.y + 55, 10, 20);
            ctx.fillRect(obstacle.x + obstacleWidth - 5, obstacle.y + 55, 10, 20);
            
            // Taillights
            ctx.fillStyle = '#c0392b';
            ctx.fillRect(obstacle.x + 5, obstacle.y, 15, 5);
            ctx.fillRect(obstacle.x + obstacleWidth - 20, obstacle.y, 15, 5);
        }

        // Draw road
        function drawRoad() {
            // Road background
            ctx.fillStyle = '#34495e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grass borders
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, 0, 50, canvas.height);
            ctx.fillRect(canvas.width - 50, 0, 50, canvas.height);
            
            // Road
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(50, 0, canvas.width - 100, canvas.height);
            
            // Lane markings
            ctx.fillStyle = 'white';
            roadMarkings.forEach(mark => {
                ctx.fillRect(mark.x, mark.y, mark.width, mark.height);
            });
        }

        // Update road markings
        function updateRoadMarkings() {
            roadMarkings.forEach(mark => {
                mark.y += speed;
                if (mark.y > canvas.height) {
                    mark.y = -40;
                }
            });
        }

        // Create obstacle
        function createObstacle() {
            const lane = lanes[Math.floor(Math.random() * lanes.length)];
            obstacles.push({
                x: lane,
                y: -obstacleHeight,
                width: obstacleWidth,
                height: obstacleHeight,
                colorIndex: Math.floor(Math.random() * 4)
            });
        }

        // Update obstacles
        function updateObstacles() {
            obstacles.forEach((obstacle, index) => {
                obstacle.y += speed;
                
                // Remove obstacle if off screen
                if (obstacle.y > canvas.height) {
                    obstacles.splice(index, 1);
                    score += 10;
                    updateScore();
                }
                
                // Check collision
                if (checkCollision(player, obstacle)) {
                    gameOver();
                }
            });
        }

        // Check collision
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // Update player position
        function updatePlayer() {
            if (keys['ArrowLeft'] && player.x > 60) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] && player.x < canvas.width - 110) {
                player.x += player.speed;
            }
        }

        // Update score
        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('speed').textContent = Math.floor(speed);
            
            // Increase speed gradually
            if (score % 100 === 0 && score > 0) {
                speed += 0.5;
            }
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxSpeed').textContent = Math.floor(speed);
            document.getElementById('gameOver').classList.add('show');
        }

        // Start game
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            speed = 5;
            obstacles = [];
            player.x = canvas.width / 2 - 25;
            initRoadMarkings();
            updateScore();
            animate();
        }

        // Restart game
        function restartGame() {
            document.getElementById('gameOver').classList.remove('show');
            document.getElementById('startScreen').style.display = 'flex';
        }

        // Animation loop
        let obstacleTimer = 0;
        function animate() {
            if (!gameRunning) return;
            
            drawRoad();
            updateRoadMarkings();
            updatePlayer();
            updateObstacles();
            
            // Draw everything
            obstacles.forEach(obstacle => drawObstacle(obstacle));
            drawPlayer();
            
            // Create new obstacles
            obstacleTimer++;
            if (obstacleTimer > 60 / speed * 10) {
                createObstacle();
                obstacleTimer = 0;
            }
            
            gameLoop = requestAnimationFrame(animate);
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Initialize
        initRoadMarkings();
        initCarPreviews();
    </script>
</body>
</html>
